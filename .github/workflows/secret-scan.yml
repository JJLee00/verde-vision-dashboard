name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so a secret buried in an old commit is still caught.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      # Two passes, same as the local pre-commit hook: gitleaks 8.30.1
      # silently drops custom [[rules]] when combined with [extend].useDefault
      # in one config file — see .gitleaks.toml.
      - name: Scan history (built-in rules)
        run: gitleaks detect --redact -v

      - name: Scan history (custom Supabase / Vision Pro rules)
        if: always()
        run: gitleaks detect --redact -v --config .gitleaks.toml
